{% extends "base.html" %}

{% block content %}
<h2>Dashboard</h2>

<h3>Your Tasks</h3>

{% if logs %}
  <ul>
    {% for log in logs %}
      <li>
        <strong>{{ log.title }}</strong> - {{ log.status }}

        {% if log.status != 'Completed' %}
          <a href="{{ url_for('complete_log', id=log.id) }}">Complete</a>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>No tasks yet.</p>
{% endif %}

{% endblock %}
